<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Telegram Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

h1 {
  margin-top:60px;
  text-shadow:0 0 10px #00ff9f;
}

button {
  margin-top:30px;
  padding:18px 30px;
  font-size:18px;
  border:1px solid #00ff9f;
  background:transparent;
  color:#00ff9f;
  border-radius:10px;
  cursor:pointer;
}

button:hover {
  background:#00ff9f;
  color:black;
  box-shadow:0 0 20px #00ff9f;
}

#status {
  margin-top:20px;
  font-size:14px;
  opacity:0.85;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.content {
  position:relative;
  z-index:2;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">
  <h1>📡 CONNECT TELEGRAM</h1>
  <button onclick="connect()">🚀 Подключить</button>
  <div id="status">Готово</div>
</div>

<script>

// ====== КНОПКА (ТВОЙ ПРОКСИ) ======
function connect() {
  const status = document.getElementById("status");

  status.innerText = "Подключаем...";

  const tgLink = "tg://proxy?server=62.133.63.98&port=443&secret=e2264d200b7f7892d4bf3b295e3b52ef";

  const a = document.createElement("a");
  a.href = tgLink;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();

  setTimeout(() => {
    status.innerText = "Если не подключилось — проверь Telegram";
  }, 2000);
}

// ====== MATRIX ======
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff9f";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
