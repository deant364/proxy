<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Telegram Connect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
const tgLink = "tg://proxy?server=72.56.125.112&port=443&secret=ee9214ffb6c9054298359f964a324e0f1b676f6f676c652e636f6d";

function connect() {
  const status = document.getElementById("status");

  status.innerText = "Открываем Telegram...";

  // основной запуск
  window.location.href = tgLink;

  // fallback (если браузер тупит)
  setTimeout(() => {
    window.open(tgLink, "_blank");
  }, 700);

  // сообщение если не получилось
  setTimeout(() => {
    status.innerText = "Если не открылось — нажми кнопку ниже";
  }, 2500);
}

// автостарт
window.onload = () => {
  setTimeout(connect, 500);
};
</script>

<style>
body {
  background:black;
  color:#00ff9f;
  font-family:monospace;
  text-align:center;
  padding-top:80px;
}

h1 {
  text-shadow:0 0 10px #00ff9f;
}

button {
  margin-top:20px;
  padding:15px 25px;
  font-size:16px;
  border:1px solid #00ff9f;
  background:transparent;
  color:#00ff9f;
  border-radius:8px;
}

button:hover {
  background:#00ff9f;
  color:black;
}
</style>
</head>

<body>

<h1>📡 CONNECT TELEGRAM</h1>
<p id="status">Запуск...</p>

<button onclick="connect()">🚀 Подключить вручную</button>

</body>
</html>
